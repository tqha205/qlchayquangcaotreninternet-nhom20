<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Khách hàng – ADS Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

<aside class="sidebar">
  <div class="sb-logo"><span class="sb-logo-icon">📊</span><span class="sb-logo-text">ADS Manager</span></div>
  <nav class="sb-nav">
    <div class="sb-section">Menu chính</div>
    <button class="sb-item" onclick="goTo('dashboard')"><span class="sb-icon">🏠</span>Tổng quan</button>
    <button class="sb-item" onclick="goTo('campaigns')"><span class="sb-icon">🎯</span>Chiến dịch QC</button>
    <button class="sb-item active" onclick="goTo('customers')"><span class="sb-icon">👥</span>Khách hàng</button>
    <button class="sb-item" onclick="goTo('reports')"><span class="sb-icon">📈</span>Báo cáo</button>
    <div class="sb-section" style="margin-top:10px;">Hệ thống</div>
    <button class="sb-item"><span class="sb-icon">⚙️</span>Cài đặt</button>
  </nav>
  <div class="sb-foot">
    <div class="sb-user">
      <div class="sb-avatar">A</div>
      <div><div class="sb-uname">Admin</div><div class="sb-role">Quản trị viên</div></div>
      <button class="sb-logout" onclick="goTo('login')">⏏</button>
    </div>
  </div>
</aside>

<div class="main">
  <header class="topbar">
    <div class="topbar-left">
      <h1>Quản lý khách hàng</h1>
      <p>Thêm mới, cập nhật và theo dõi thông tin khách hàng</p>
    </div>
    <div class="topbar-right">
      <button class="notif-btn">🔔</button>
      <span class="topbar-date" id="topbar-date"></span>
    </div>
  </header>

  <div class="page">
    <div class="card">
      <div class="toolbar">
        <input type="text" id="cust-search" class="search-box" placeholder="Tìm theo tên công ty, email, SĐT..." oninput="filterTable('cust-search','cust-table')">
        <div style="margin-left:auto;">
          <button class="btn btn-success" onclick="openModal('modal-cust-add')">＋ Thêm khách hàng</button>
        </div>
      </div>

      <table class="tbl" id="cust-table">
        <thead>
          <tr><th>Mã KH</th><th>Tên công ty</th><th>Người liên hệ</th><th>Email</th><th>Số điện thoại</th><th>Chiến dịch</th><th>Thao tác</th></tr>
        </thead>
        <tbody id="cust-body">
          <!-- Rendered by JS -->
        </tbody>
      </table>
    </div>
  </div>
</div>
</div>

<!-- THÊM KHÁCH HÀNG -->
<div class="overlay" id="modal-cust-add">
  <div class="modal">
    <div class="modal-hd"><span class="modal-ttl">➕ Thêm khách hàng mới</span><button class="modal-cls" onclick="closeModal('modal-cust-add')">✕</button></div>
    <div class="modal-bd">
      <div class="f2">
        <div class="fg"><label class="flbl">Tên công ty *</label><input type="text" id="a-c-name" class="fc" placeholder="Công ty TNHH ABC..."></div>
        <div class="fg"><label class="flbl">Người liên hệ *</label><input type="text" id="a-c-contact" class="fc" placeholder="Nguyễn Văn A"></div>
      </div>
      <div class="f2">
        <div class="fg"><label class="flbl">Email *</label><input type="email" id="a-c-email" class="fc" placeholder="contact@company.vn"></div>
        <div class="fg"><label class="flbl">Số điện thoại</label><input type="text" id="a-c-phone" class="fc" placeholder="090x xxx xxxx"></div>
      </div>
      <div class="fg"><label class="flbl">Địa chỉ</label><input type="text" id="a-c-addr" class="fc" placeholder="12 Nguyễn Huệ, Q.1, TP.HCM"></div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-ghost" onclick="closeModal('modal-cust-add')">Hủy</button>
      <button class="btn btn-success" onclick="addCustomer()">💾 Lưu khách hàng</button>
    </div>
  </div>
</div>

<!-- SỬA KHÁCH HÀNG -->
<div class="overlay" id="modal-cust-edit">
  <div class="modal">
    <div class="modal-hd"><span class="modal-ttl">✏ Sửa thông tin khách hàng</span><button class="modal-cls" onclick="closeModal('modal-cust-edit')">✕</button></div>
    <div class="modal-bd">
      <input type="hidden" id="e-c-id">
      <div class="f2">
        <div class="fg"><label class="flbl">Tên công ty *</label><input type="text" id="e-c-name" class="fc"></div>
        <div class="fg"><label class="flbl">Người liên hệ</label><input type="text" id="e-c-contact" class="fc"></div>
      </div>
      <div class="f2">
        <div class="fg"><label class="flbl">Email</label><input type="email" id="e-c-email" class="fc"></div>
        <div class="fg"><label class="flbl">Số điện thoại</label><input type="text" id="e-c-phone" class="fc"></div>
      </div>
      <div class="fg"><label class="flbl">Địa chỉ</label><input type="text" id="e-c-addr" class="fc"></div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-ghost" onclick="closeModal('modal-cust-edit')">Hủy</button>
      <button class="btn btn-warning" onclick="saveCustomer()">💾 Cập nhật</button>
    </div>
  </div>
</div>

<div id="toast-area"></div>
<script src="main.js"></script>
<script>
let customers = [
  {id:'KH001',name:'Công ty Thời trang ABC',contact:'Nguyễn Minh Hà',email:'ha@abc.vn',phone:'0901 234 567',address:'12 Lê Lợi, Q.1, HCM',camCount:3},
  {id:'KH002',name:'Cty TNHH SaaS Việt',contact:'Trần Long',email:'long@saas.vn',phone:'0912 345 678',address:'45 Đinh Tiên Hoàng',camCount:2},
  {id:'KH003',name:'Shop Điện tử XYZ',contact:'Phạm Thu Hương',email:'huong@xyz.vn',phone:'0923 456 789',address:'78 Nguyễn Trãi, Q.5',camCount:1},
  {id:'KH004',name:'Nhà hàng Phố Xưa',contact:'Lê Văn Bình',email:'binh@phoxua.vn',phone:'0934 567 890',address:'99 Pasteur, Q.3',camCount:4},
  {id:'KH005',name:'Spa Hà Nội Beauty',contact:'Trần Thanh Loan',email:'loan@beauty.vn',phone:'0945 678 901',address:'23 Hàng Bài, HN',camCount:2},
];
let nextCustId = 6;

function renderCustomers(){
  const body = document.getElementById('cust-body');
  if(!customers.length){
    body.innerHTML = `<tr><td colspan="7"><div class="empty"><div class="empty-ico">👥</div><div class="empty-txt">Chưa có khách hàng nào</div></div></td></tr>`;
    return;
  }
  body.innerHTML = customers.map(c => `
    <tr>
      <td><span class="badge b-kid">${c.id}</span></td>
      <td>
        <div style="font-weight:700;color:#1E293B;">${c.name}</div>
        <div style="font-size:11px;color:#94A3B8;margin-top:2px;">${c.address||'Chưa cập nhật địa chỉ'}</div>
      </td>
      <td>${c.contact}</td>
      <td><a href="mailto:${c.email}" style="color:#2563EB;">${c.email}</a></td>
      <td>${c.phone}</td>
      <td><span class="badge b-run">${c.camCount} chiến dịch</span></td>
      <td>
        <div style="display:flex;gap:5px;">
          <button class="btn btn-primary btn-sm" onclick="openCustEdit('${c.id}')">✏ Sửa</button>
          <button class="btn btn-danger btn-sm" onclick="delCustomer('${c.id}','${c.name}',this)">🗑 Xóa</button>
        </div>
      </td>
    </tr>
  `).join('');
}

function addCustomer(){
  const name = document.getElementById('a-c-name').value.trim();
  if(!name){ alert("Nhập tên công ty!"); return; }
  customers.push({
    id: 'KH' + String(nextCustId++).padStart(3,'0'),
    name,
    contact: document.getElementById('a-c-contact').value,
    email: document.getElementById('a-c-email').value,
    phone: document.getElementById('a-c-phone').value,
    address: document.getElementById('a-c-addr').value,
    camCount: 0
  });
  closeModal('modal-cust-add');
  renderCustomers();
  toast("Đã thêm khách hàng "+name);
  ['a-c-name','a-c-contact','a-c-email','a-c-phone','a-c-addr'].forEach(id=>document.getElementById(id).value='');
}

function openCustEdit(id){
  const c = customers.find(x=>x.id===id);
  if(!c) return;
  document.getElementById('e-c-id').value = c.id;
  document.getElementById('e-c-name').value = c.name;
  document.getElementById('e-c-contact').value = c.contact;
  document.getElementById('e-c-email').value = c.email;
  document.getElementById('e-c-phone').value = c.phone;
  document.getElementById('e-c-addr').value = c.address;
  openModal('modal-cust-edit');
}

function saveCustomer(){
  const id = document.getElementById('e-c-id').value;
  const c = customers.find(x=>x.id===id);
  if(!c) return;
  c.name = document.getElementById('e-c-name').value;
  c.contact = document.getElementById('e-c-contact').value;
  c.email = document.getElementById('e-c-email').value;
  c.phone = document.getElementById('e-c-phone').value;
  c.address = document.getElementById('e-c-addr').value;
  closeModal('modal-cust-edit');
  renderCustomers();
  toast("Đã cập nhật "+c.name);
}

function delCustomer(id, name, btn){
  if(confirm(`Xóa khách hàng "${name}"?`)){
    customers = customers.filter(c=>c.id!==id);
    renderCustomers();
    toast("Đã xóa "+name);
  }
}

renderCustomers();
</script>
</body>
</html>
