<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - ADS Manager</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5',
                        secondary: '#0F172A',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-indigo-600 flex items-center justify-center min-h-screen p-4 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-indigo-500 via-indigo-600 to-indigo-900 antialiased">
    
    <div class="w-full max-w-md bg-white/95 backdrop-blur-xl p-10 rounded-3xl shadow-2xl shadow-indigo-900/40 animate-in fade-in zoom-in duration-500">
        <div class="text-center mb-10">
             <div class="bg-indigo-50 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-inner">
                <i data-lucide="bar-chart-3" class="w-10 h-10 text-primary"></i>
             </div>
             <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Chào mừng quay lại</h2>
             <p class="text-slate-500 text-sm mt-2">Hệ thống quản lý quảng cáo tập trung</p>
        </div>

        <form onsubmit="event.preventDefault(); doLogin();" id="login-form" class="space-y-6">
            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-700 uppercase tracking-wider ml-1">Tên đăng nhập</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                        <i data-lucide="user" class="w-5 h-5"></i>
                    </span>
                    <input type="text" id="username" required class="w-full pl-12 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 text-sm focus:outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all placeholder:text-slate-400" placeholder="admin / marketer / client">
                </div>
            </div>
            
            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-700 uppercase tracking-wider ml-1">Mật khẩu</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                        <i data-lucide="lock" class="w-5 h-5"></i>
                    </span>
                    <input type="password" id="password" required class="w-full pl-12 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 text-sm focus:outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all placeholder:text-slate-400" placeholder="••••••••">
                </div>
            </div>

            <div class="flex items-center justify-between text-sm py-2">
                <label class="flex items-center gap-2 cursor-pointer text-slate-600">
                    <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-primary focus:ring-primary">
                    Ghi nhớ đăng nhập
                </label>
                <a href="#" class="text-primary font-bold hover:underline">Quên mật khẩu?</a>
            </div>

            <button type="submit" id="login-btn" class="w-full bg-primary text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-indigo-700 transition-all shadow-xl shadow-indigo-200 active:scale-[0.98]">
                Đăng nhập ngay <i data-lucide="arrow-right" class="w-5 h-5"></i>
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-slate-500 text-sm">
                Chưa có tài khoản? 
                <a href="{{ url_for('public.register_page') }}" class="text-primary font-bold hover:underline">Đăng ký ngay</a>
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();
        async function doLogin() {
            const btn = document.getElementById('login-btn');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<span class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></span> Đang xử lý...';
            btn.disabled = true;

            try {
                const res = await fetch("{{ url_for('auth.login') }}", {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if(data.success) {
                    if(data.role === 'client') {
                        window.location.href = "{{ url_for('public.index') }}";
                    } else {
                        window.location.href = "{{ url_for('admin.dashboard') }}";
                    }
                } else {
                    alert(data.message);
                    btn.innerHTML = originalContent;
                    btn.disabled = false;
                    lucide.createIcons();
                }
            } catch (error) {
                alert('Có lỗi xảy ra, vui lòng thử lại sau.');
                btn.innerHTML = originalContent;
                btn.disabled = false;
                lucide.createIcons();
            }
        }
    </script>
</body>
</html>
