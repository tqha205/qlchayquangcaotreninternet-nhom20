<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - ADS Manager</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5',
                        secondary: '#0F172A',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-indigo-600 flex items-center justify-center min-h-screen p-4 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-indigo-500 via-indigo-600 to-indigo-900 antialiased">
    
    <div class="w-full max-w-xl bg-white/95 backdrop-blur-xl p-10 rounded-[2.5rem] shadow-2xl shadow-indigo-900/40 animate-in fade-in zoom-in duration-500">
        <div class="text-center mb-10">
             <div class="bg-indigo-50 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-inner">
                <i data-lucide="user-plus" class="w-10 h-10 text-primary"></i>
             </div>
             <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Tạo tài khoản mới</h2>
             <p class="text-slate-500 text-sm mt-2">Bắt đầu quản lý chiến dịch quảng cáo của bạn ngay hôm nay</p>
        </div>

        <form onsubmit="event.preventDefault(); doRegister();" id="register-form" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2 col-span-2">
                    <label class="text-xs font-bold text-slate-700 uppercase tracking-wider ml-1">Họ và Tên *</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <i data-lucide="info" class="w-5 h-5"></i>
                        </span>
                        <input type="text" id="full_name" required class="w-full pl-12 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 text-sm focus:outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all placeholder:text-slate-400" placeholder="Nguyễn Văn A">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-700 uppercase tracking-wider ml-1">Tên đăng nhập *</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <i data-lucide="user" class="w-5 h-5"></i>
                        </span>
                        <input type="text" id="username" required class="w-full pl-12 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 text-sm focus:outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all placeholder:text-slate-400" placeholder="username">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-700 uppercase tracking-wider ml-1">Mật khẩu *</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <i data-lucide="lock" class="w-5 h-5"></i>
                        </span>
                        <input type="password" id="password" required class="w-full pl-12 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 text-sm focus:outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all placeholder:text-slate-400" placeholder="••••••••">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-700 uppercase tracking-wider ml-1">Email</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <i data-lucide="mail" class="w-5 h-5"></i>
                        </span>
                        <input type="email" id="email" class="w-full pl-12 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 text-sm focus:outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all placeholder:text-slate-400" placeholder="example@email.com">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-700 uppercase tracking-wider ml-1">Số điện thoại</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <i data-lucide="phone" class="w-5 h-5"></i>
                        </span>
                        <input type="text" id="phone" class="w-full pl-12 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 text-sm focus:outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all placeholder:text-slate-400" placeholder="0901xxxxxx">
                    </div>
                </div>
            </div>

            <button type="submit" id="register-btn" class="w-full bg-primary text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-indigo-700 transition-all shadow-xl shadow-indigo-200 active:scale-[0.98]">
                Đăng ký ngay <i data-lucide="check" class="w-5 h-5"></i>
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-slate-500 text-sm">
                Đã có tài khoản? 
                <a href="{{ url_for('public.login_page') }}" class="text-primary font-bold hover:underline">Đăng nhập tại đây</a>
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();
        async function doRegister() {
            const btn = document.getElementById('register-btn');
            const data = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                full_name: document.getElementById('full_name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value
            };

            if(!data.username || !data.password || !data.full_name) {
                alert('Vui lòng điền các trường bắt buộc (*)');
                return;
            }

            const originalContent = btn.innerHTML;
            btn.innerHTML = '<span class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></span> Đang xử lý...';
            btn.disabled = true;

            try {
                const res = await fetch("{{ url_for('auth.register') }}", {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if(result.success) {
                    window.location.href = "{{ url_for('public.index') }}";
                } else {
                    alert(result.message || 'Đăng ký không thành công');
                    btn.innerHTML = originalContent;
                    btn.disabled = false;
                    lucide.createIcons();
                }
            } catch (error) {
                alert('Có lỗi xảy ra, vui lòng thử lại sau.');
                btn.innerHTML = originalContent;
                btn.disabled = false;
                lucide.createIcons();
            }
        }
    </script>
</body>
</html>
